<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOGO - PEDRA - PAPEL - TESOURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <main class="h-screen flex p-14 bg-slate-900 relative">

        <section class="lado esquerdo PLAYER 01 h-full w-full felx bg-slate-300 rounded-l-2xl">

            <div class="flex flex-col justify-center items-center mt-5">
                <h1 class="text-2xl font-bold text-center text-blue-700">"PLAYER - 01"</h1>
                <p class="text-2xl font-bold text-center">Seja bem vindo ao jogo</p>
                <p class="text-xl font-semibold">Pedra, Papel e Tesoura</p>
                <p>Escolha uma opção abaixo:</p>
            </div>
            
            <div class=" flex w-full justify-center mt-5">
                <div id="resultadoplay2" class="resultado bg-gray-300 w-28 h-28 rounded-full border-solid border-blue-700 border-2"></div>
            </div>

            <div class="botoes w-full flex justify-center items-center gap-4 mt-5">
                <button onclick="jogar1('pedra')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">👊</button>
                <button onclick="jogar1('papel')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">✋</button>
                <button onclick="jogar1('tesoura')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">✌️</button>
            </div>

            <div class="flex flex-col gap-2 justify-center items-center mt-5">
                <button onclick="resultadoplay1()"
                    class="bg-blue-700 p-4 rounded-2xl text-white font-bold cursor-pointer hover:bg-fuchsia-950 hover:translate-y-1 hover:transition-all">PUXAR
                    RESULTADO</button>
    
                <p id="resultadotextoplay1"></p>
            </div>

        </section>
        
        <div class="text-white font-bold text-4xl bg-slate-800 w-fit h-fit rounded-2xl p-2 absolute inset-0 m-auto justify-center items-center flex ">V.S</div>

        <section class="lado direito PLAYER 02 h-full w-full felx bg-slate-400 rounded-r-2xl">

            <div class="flex flex-col justify-center items-center mt-5">
                <h1 class="text-2xl font-bold text-center text-fuchsia-800">"PLAYER - 01"</h1>
                <p class="text-2xl font-bold text-center">Seja bem vindo ao jogo</p>
                <p class="text-xl font-semibold">Pedra, Papel e Tesoura</p>
                <p>Escolha uma opção abaixo:</p>
            </div>

            <div class=" flex w-full justify-center mt-5">
                <div id="resultadoplay1"
                    class="resultado bg-gray-300 w-28 h-28 rounded-full border-solid border-fuchsia-800 border-2"></div>
            </div>

            <div class="botoes w-full flex justify-center items-center gap-4 mt-5">
                <button onclick="jogar2('pedra')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">👊</button>
                <button onclick="jogar2('papel')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">✋</button>
                <button onclick="jogar2('tesoura')"
                    class="bg-slate-600 w-20 h-20 rounded-full p-4 text-4xl hover:bg-green-800 hover:transition-all hover:-translate-y-1">✌️</button>
            </div>

            <div class="flex flex-col gap-2 justify-center items-center mt-5">
                <button onclick="resultadoplay2()"
                    class="bg-fuchsia-800 p-4 rounded-2xl text-white font-bold cursor-pointer hover:bg-fuchsia-950 hover:translate-y-1 hover:transition-all">PUXAR
                    RESULTADO</button>
                <p id="resultadotextoplay2"></p>

            </div>


        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
